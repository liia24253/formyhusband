<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>21 Birthday Galaxy</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100%;
    height:100vh;

    overflow:hidden;

    font-family:"Segoe UI", sans-serif;

    color:white;

    background:
    radial-gradient(circle at top,
    #183b78,
    #050b25 45%,
    #01030d 100%);

}



/* =====================
   МЕРЦАЮЩИЕ ЗВЕЗДЫ
===================== */


.star{

    position:absolute;

    width:3px;

    height:3px;

    background:white;

    border-radius:50%;

    box-shadow:
    0 0 10px white;


    animation:twinkle 3s infinite;

}



@keyframes twinkle{

    0%,100%{
        opacity:.2;
        transform:scale(1);
    }


    50%{
        opacity:1;
        transform:scale(2);
    }

}



/* =====================
   ПАДАЮЩИЕ СЕРДЕЧКИ
===================== */


.heart{

    position:absolute;

    top:-50px;

    color:#ff9bdd;

    font-size:25px;


    text-shadow:
    0 0 15px #ff4fc3;


    animation:fall linear forwards;

}



@keyframes fall{


    from{

        transform:
        translateY(-50px)
        rotate(0deg);

        opacity:1;

    }


    to{

        transform:
        translateY(110vh)
        rotate(360deg);

        opacity:0;

    }

}



/* =====================
   GLASSMORPHISM КАРТОЧКА
===================== */


.card{


    position:absolute;


    width:90%;

    max-width:520px;


    left:50%;

    top:50%;


    transform:
    translate(-50%,-50%);



    padding:40px 30px;


    text-align:center;



    background:

    rgba(255,255,255,.12);



    backdrop-filter:

    blur(18px);



    border:

    1px solid rgba(255,255,255,.25);



    border-radius:35px;



    box-shadow:

    0 0 50px rgba(255,255,255,.15);



    z-index:5;


}




.card h1{

    font-size:60px;

    margin-bottom:10px;

}



.card h2{

    font-size:30px;

    color:#ffd7ef;

    margin-bottom:20px;

}



.message{

    min-height:120px;

    font-size:20px;

    line-height:1.6;

}




/* =====================
      КНОПКИ
===================== */


button{


    margin:10px;


    padding:14px 28px;


    border:none;


    border-radius:30px;


    color:white;


    font-size:17px;


    cursor:pointer;



    background:

    linear-gradient(45deg,
    #ff66c4,
    #7567ff);



    box-shadow:

    0 0 25px #ff66c4;


    transition:.3s;

}



button:hover{

    transform:scale(1.08);

}



/* =====================
     ФИНАЛ ГАЛАКТИКИ
===================== */


.final{


    position:fixed;

    inset:0;


    display:flex;

    justify-content:center;

    align-items:center;


    overflow:hidden;


    background:


    radial-gradient(circle,

    #c875ff,

    #32105f 30%,

    #020617 75%);



    opacity:0;


    pointer-events:none;


    transition:2s;


    z-index:10;

}



.final.active{

    opacity:1;

    pointer-events:auto;

}



.galaxy{


    position:absolute;


    width:650px;

    height:650px;


    border-radius:50%;



    background:


    radial-gradient(
    ellipse at center,

    rgba(255,255,255,.9) 0%,

    rgba(255,150,230,.7) 12%,

    rgba(120,90,255,.5) 30%,

    transparent 65%

    );



    filter:blur(1px);



    animation:


    galaxyRotate 15s linear infinite,

    galaxyAppear 3s ease forwards;


}



@keyframes galaxyRotate{


    from{

        transform:rotate(0deg) scale(1);

    }


    to{

        transform:rotate(360deg) scale(1.1);

    }

}



@keyframes galaxyAppear{


    from{

        opacity:0;

        transform:scale(0);

    }


    to{

        opacity:1;

        transform:scale(1);

    }


}



/* ЗВЕЗДНАЯ ПЫЛЬ */


.stars-galaxy{


    position:absolute;


    width:750px;

    height:750px;



    border-radius:50%;



    background-image:


    radial-gradient(
    white 1px,
    transparent 2px
    );



    background-size:35px 35px;



    opacity:.8;



    animation:

    galaxyRotate 25s linear infinite;


}




/* СЕРДЦЕ В ЦЕНТРЕ */


.glow-heart{


    position:absolute;


    font-size:150px;



    opacity:0;



    filter:


    drop-shadow(0 0 20px white)

    drop-shadow(0 0 60px #ff4fd8)

    drop-shadow(0 0 100px #8d6bff);



    animation:


    heartAppear 3s ease forwards,

    heartbeat 1.8s infinite 3s;



}




@keyframes heartAppear{


    0%{

        opacity:0;

        transform:scale(0);

    }


    70%{

        opacity:1;

        transform:scale(1.3);

    }


    100%{

        opacity:1;

        transform:scale(1);

    }

}




@keyframes heartbeat{


    0%,100%{

        transform:scale(1);

    }


    50%{

        transform:scale(1.15);

    }


}



/* ФИНАЛЬНЫЙ ТЕКСТ */


.final-text{


    position:absolute;


    bottom:15%;


    width:100%;


    text-align:center;


    font-size:34px;


    text-shadow:

    0 0 20px white;



    animation:

    textAppear 4s ease forwards;


}




@keyframes textAppear{


    from{

        opacity:0;

        transform:translateY(50px);

    }


    to{

        opacity:1;

        transform:translateY(0);

    }


}


</style>

</head>



<body>


<!-- Фоновые элементы -->

<div id="stars"></div>

<div id="hearts"></div>



<!-- Главная карточка -->


<div class="card">


<h1>
✨ 21 ✨
</h1>


<h2>
С днём рождения!
</h2>



<div class="message" id="text">


Сегодня твой особенный день 💙

Тебе 21 год — новая красивая глава твоей жизни.

Пусть все мечты становятся реальностью ✨


</div>



<button onclick="changeText()">

💌 Открыть признание

</button>


<button onclick="showGalaxy()">

🌌 Финальная галактика

</button>



</div>








<div class="final" id="final">


<div class="galaxy"></div>


<div class="stars-galaxy"></div>


<div class="glow-heart">

❤️

</div>


<div class="final-text">

Ты — моя самая яркая звезда ✨

</div>



</div>
<script>





for(let i = 0; i < 160; i++){


    let star = document.createElement("div");


    star.className = "star";


    star.style.left = Math.random()*100 + "%";

    star.style.top = Math.random()*100 + "%";


    star.style.animationDelay =
    Math.random()*5 + "s";


    star.style.opacity =
    Math.random();


    document.body.appendChild(star);


}






function createHeart(){


    let heart = document.createElement("div");


    heart.className = "heart";


    heart.innerHTML = "❤";


    heart.style.left =
    Math.random()*100 + "%";



    heart.style.fontSize =
    (15 + Math.random()*30) + "px";



    heart.style.animationDuration =
    (4 + Math.random()*6) + "s";



    document.body.appendChild(heart);



    setTimeout(()=>{

        heart.remove();

    },10000);


}



setInterval(createHeart,450);








let messages = [



"Ты делаешь этот мир намного красивее ❤️",



"Пусть твоя улыбка всегда сияет ярче всех звёзд ✨",



"21 год — это только начало невероятной истории 🌙",



"Желаю тебе счастья, любви и исполнения самых смелых желаний 💫",



"Ты особенный человек, который заслуживает всего самого лучшего 🤍",



"Спасибо за все моменты, которые хочется помнить всегда 💙",



"Пусть каждый твой день будет наполнен теплом и радостью ⭐",



"Никогда не переставай мечтать, ведь мечты создают чудеса 🌌",



"Ты — маленькая вселенная, в которой столько света ✨"



];




let index = 0;



function changeText(){



    document.getElementById("text").innerHTML =

    messages[index];



    index++;



    if(index >= messages.length){

        index = 0;

    }


}







// =====================
// ЗАПУСК ФИНАЛЬНОЙ ГАЛАКТИКИ
// =====================



function showGalaxy(){



    document

    .getElementById("final")

    .classList

    .add("active");



}



</script>


</body>

</html>
